find_trending_companies:
  description: >
    Find the top trending companies in the news in {sector} by searching the latest news which already listed in the Stock Market. Find new companies that you've not found before.
  expected_output: >
    A list of trending companies in {sector} which already listed in the Stock Market.
  agent: trending_company_finder
  output_file: output/{sector}/trending_companies.json

research_trending_companies:
  description: >
    Given a list of trending companies which already listed in the Stock Market, provide detailed analysis of each company in a report by searching online
  expected_output: >
    A report containing detailed analysis of each company which already listed in the Stock Market.
  agent: financial_researcher
  context:
    - find_trending_companies
  output_file: output/{sector}/research_report.json

pick_best_company:
  description: >
    Analyze the research findings and pick the best company for investment.
    Send an email to the user with the decision and 1 sentence rationale.
    Then respond with a detailed report on why you chose this company, and which companies were not selected.
  expected_output: >
    The chosen company and why it was chosen; the companies that were not selected and why they were not selected.
    An email with the decision and 1 sentence rationale.
  agent: stock_picker
  context:
    - research_trending_companies
  output_file: output/{sector}/decision.md
